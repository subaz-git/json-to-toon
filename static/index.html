<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON → TOON Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 32px;
      background: #161b27;
      border-bottom: 1px solid #2d3748;
    }
    header .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header .logo span { color: #60a5fa; }
    header .badge {
      font-size: 0.7rem;
      background: #1e3a5f;
      color: #60a5fa;
      border: 1px solid #2563eb;
      border-radius: 99px;
      padding: 2px 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    header p {
      margin-left: auto;
      font-size: 0.8rem;
      color: #64748b;
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 0;
      padding: 24px;
      gap: 16px;
    }

    .toolbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toolbar h2 { font-size: 0.85rem; color: #94a3b8; font-weight: 500; flex: 1; }

    /* ── Panels ── */
    .panel {
      display: flex;
      flex-direction: column;
      background: #161b27;
      border: 1px solid #2d3748;
      border-radius: 10px;
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #1e2433;
      border-bottom: 1px solid #2d3748;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .panel-header .lang { color: #60a5fa; }

    textarea, .output {
      flex: 1;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      padding: 16px;
      background: transparent;
      color: #e2e8f0;
      border: none;
      outline: none;
      resize: none;
      white-space: pre;
      overflow: auto;
      min-height: 400px;
    }
    textarea::placeholder { color: #4a5568; }
    textarea { caret-color: #60a5fa; }

    .output { color: #a3e635; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border: none;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-ghost {
      background: #1e2433;
      color: #94a3b8;
      border: 1px solid #2d3748;
    }
    .btn-ghost:hover { background: #2d3748; color: #e2e8f0; }

    .btn-sm { padding: 4px 12px; font-size: 0.75rem; }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      grid-column: 1 / -1;
      background: #7f1d1d;
      border: 1px solid #dc2626;
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.85rem;
    }
    #error-banner.show { display: block; }

    /* ── Status indicator ── */
    .status { font-size: 0.75rem; color: #4a5568; }
    .status.ok { color: #4ade80; }
    .status.err { color: #f87171; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
      header p { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">JSON → <span>TOON</span></div>
  <span class="badge">Token Oriented Object Notation</span>
  <p>FastAPI · Python</p>
</header>

<main>
  <div class="toolbar">
    <button class="btn btn-primary" id="convertBtn">⚡ Convert</button>
    <button class="btn btn-ghost" id="prettyBtn">✨ Pretty JSON</button>
    <button class="btn btn-ghost" id="clearBtn">🗑 Clear</button>
    <button class="btn btn-ghost" id="sampleBtn">📋 Load Sample</button>
    <span class="status" id="status"></span>
  </div>

  <div id="error-banner" role="alert"></div>

  <!-- JSON Input -->
  <div class="panel">
    <div class="panel-header">
      <span>Input <span class="lang">JSON</span></span>
      <span id="char-count" style="font-size:0.72rem;color:#4a5568;font-weight:400"></span>
    </div>
    <textarea id="jsonInput" spellcheck="false" placeholder='Paste your JSON here…'></textarea>
  </div>

  <!-- TOON Output -->
  <div class="panel">
    <div class="panel-header">
      <span>Output <span class="lang">TOON</span></span>
      <button class="btn btn-ghost btn-sm" id="copyBtn">📋 Copy</button>
    </div>
    <pre class="output" id="toonOutput"></pre>
  </div>
</main>

<script>
const SAMPLE = JSON.stringify({
  "animals": [
    { "name": "African Elephant",   "category": "mammal",    "habitat": "savanna",            "diet": "herbivore" },
    { "name": "Red-Eyed Tree Frog", "category": "amphibian", "habitat": "rainforest",         "diet": "carnivore" },
    { "name": "Bald Eagle",         "category": "bird",      "habitat": "forests near water", "diet": "carnivore" },
    { "name": "Great White Shark",  "category": "fish",      "habitat": "ocean",              "diet": "carnivore" }
  ]
}, null, 2);

const jsonInput  = document.getElementById('jsonInput');
const toonOutput = document.getElementById('toonOutput');
const status     = document.getElementById('status');
const errBanner  = document.getElementById('error-banner');
const charCount  = document.getElementById('char-count');

function setError(msg) {
  errBanner.textContent = '⚠ ' + msg;
  errBanner.classList.add('show');
  status.textContent = 'Error';
  status.className = 'status err';
}
function clearError() {
  errBanner.classList.remove('show');
}

jsonInput.addEventListener('input', () => {
  charCount.textContent = jsonInput.value.length + ' chars';
  clearError();
});

document.getElementById('convertBtn').addEventListener('click', async () => {
  clearError();
  const raw = jsonInput.value.trim();
  if (!raw) { setError('Input is empty.'); return; }

  status.textContent = 'Converting…';
  status.className = 'status';

  try {
    const res = await fetch('/convert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ json_data: raw })
    });
    const payload = await res.json();
    if (!res.ok) { setError(payload.detail || 'Server error'); return; }
    toonOutput.textContent = payload.toon;
    status.textContent = '✓ Done';
    status.className = 'status ok';
  } catch (e) {
    setError('Network error: ' + e.message);
  }
});

document.getElementById('prettyBtn').addEventListener('click', () => {
  try {
    const parsed = JSON.parse(jsonInput.value);
    jsonInput.value = JSON.stringify(parsed, null, 2);
    clearError();
  } catch (e) {
    setError('Invalid JSON – cannot pretty-print.');
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  jsonInput.value = '';
  toonOutput.textContent = '';
  charCount.textContent = '';
  clearError();
  status.textContent = '';
  status.className = 'status';
});

document.getElementById('sampleBtn').addEventListener('click', () => {
  jsonInput.value = SAMPLE;
  charCount.textContent = SAMPLE.length + ' chars';
  clearError();
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = toonOutput.textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy', 1500);
  });
});

// Ctrl+Enter to convert
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    document.getElementById('convertBtn').click();
  }
});
</script>
</body>
</html>
